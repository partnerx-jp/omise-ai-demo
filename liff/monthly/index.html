<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.line-scdn.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://partnerx-jp.github.io https://api.line.me https://*.line.me https://*.line-apps.com https://*.line-scdn.net;">
  <link rel="stylesheet" href="../shared.css?v=20260714">
  <title>お店のAIワーカー</title>
  <style>
    .ow-header .ttl .ttl-date { font-size: 14px; font-weight: 400; color: var(--sub); margin-left: 7px; }
    .chartbox { position: relative; height: 200px; }
    /* PL明細行 */
    .ow-plrow { display: flex; padding: 9px 0; border-top: 1px solid var(--line); font-size: 13px; }
    .ow-plrow:first-child { border-top: none; }
    .ow-plrow .l { flex: 5; color: var(--sub); }
    .ow-plrow .a { flex: 4; text-align: right; color: var(--ink); }
    .ow-plrow .p { flex: 2; text-align: right; color: var(--sub); }
    .ow-plrow .d { flex: 3; text-align: right; font-size: 11px; }
    .ow-plrow.total { border-top: 2px solid #ddd; font-weight: 700; margin-top: 2px; }
    .ow-plrow.total .l { color: var(--ink); }
    .ow-plrow.total .a, .ow-plrow.total .p { color: var(--brand); }
    /* FL率バー（目標マーカー付き） */
    .ow-fltrack { height: 12px; border-radius: 6px; background: #EEF1F2; position: relative; overflow: hidden; margin-top: 6px; }
    .ow-fltrack > i { display: block; height: 100%; background: var(--neg); }
    .ow-fltrack .tgt { position: absolute; top: -3px; width: 2px; height: 18px; background: #333; }
    .chartbox.tall { height: 220px; }
  </style>
</head>
<body class="ow-hasbottom">
  <div class="ow-header">
    <div class="ttl" id="ttl">月次レポート（全店）</div>
    <div class="sub" id="sub">読み込み中…</div>
  </div>
  <div id="app"><div class="ow-loading">読み込み中…</div></div>
  <div class="ow-cta"><button class="ow-btn" id="cta" style="background:linear-gradient(180deg,#12D262,#06C755);border:1.5px solid #05993F;color:#fff;box-shadow:0 3px 0 #05993F,0 4px 6px rgba(0,0,0,.16)">あなたのお店でお試し（無料相談）</button></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../vendor/chart.umd.min.js"></script>
  <script>
    const LIFF_ID = "", SHINDAN = "../shindan/";
    const BRAND = "#00A0E9", NEG = "#E5504F";
    const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
    const pct = n => (n*100).toFixed(1) + "%";
    const pctSigned = n => (n>=0?"+":"") + (n*100).toFixed(1) + "%";
    const grid = { grid:{color:"#F0F0F0"}, ticks:{font:{size:9},color:"#999"} };
    const gridX = { grid:{display:false}, ticks:{font:{size:9},color:"#999"} };
    let DATA, charts = {};

    function monthLabel(){ const d=new Date(); d.setMonth(d.getMonth()-1); return (d.getMonth()+1)+"月度"; }

    async function boot(){
      try { if (LIFF_ID && window.liff) await liff.init({liffId:LIFF_ID}).catch(()=>{}); } catch(e){}
      const SRC = ["../../data/demo-data.json", "https://partnerx-jp.github.io/omise-ai-demo/data/demo-data.json"];
      let lastErr;
      for (const u of SRC){ try { const r = await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(r.status); DATA = await r.json(); lastErr=null; break; } catch(e){ lastErr=e; } }
      if (!DATA){ document.getElementById("app").innerHTML = `<div class="ow-error">データを読み込めませんでした（${lastErr&&lastErr.message}）</div>`; return; }
      document.getElementById("ttl").innerHTML = `月次レポート（全店）<span class="ttl-date">${monthLabel()}</span>`;
      document.getElementById("sub").textContent = DATA.company.brand;
      render();
    }

    function render(){
      const m = DATA.monthly_report, t = m.total;
      const trend = m.trend_12m, prev = trend[trend.length-2];
      const mom = prev ? (t.net_sales - prev.sales) / prev.sales : 0;
      let h = `<div class="ow-wrap">`;

      // ① ヒーロー（純売上＋前月比／営業利益・利益率・FL率）
      h += `<div class="ow-card">
        <div class="ow-hero-lbl">全店 純売上（税抜）</div>
        <div class="ow-hero-main">
          <span class="ow-hero-val">${yen(t.net_sales)}</span>
          <span class="ow-hero-delta"><span class="dl">前月比</span><span class="dv ${mom>=0?'ow-up':'ow-down'}">${pctSigned(mom)}</span></span>
        </div>
        <div class="ow-kpis" style="margin-top:14px;border-top:1px solid var(--line);padding-top:10px">
          <div class="ow-kpi"><div class="l">営業利益</div><div class="v ow-up">${yen(t.operating_profit)}</div></div>
          <div class="ow-kpi"><div class="l">営業利益率</div><div class="v">${pct(t.operating_profit_rate)}</div></div>
          <div class="ow-kpi"><div class="l">FL率</div><div class="v ${t.fl_rate>t.fl_target?'ow-down':'ow-up'}">${pct(t.fl_rate)}</div></div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:11px;color:var(--sub)">FL率 ${pct(t.fl_rate)}（目標 ${pct(t.fl_target)}）</div>
          <div class="ow-fltrack"><i style="width:${Math.min(t.fl_rate*100,100)}%"></i><div class="tgt" style="left:${t.fl_target*100}%"></div></div>
        </div>
      </div>`;

      // ② 損益（PL）明細
      h += `<div class="ow-card"><h2>損益（PL）</h2>` +
        t.costs.map(c=>`<div class="ow-plrow"><div class="l">${c.label}</div><div class="a">${yen(c.amount)}</div><div class="p">${pct(c.rate)}</div><div class="d ${c.vs_prev.startsWith('+')?'ow-down':(c.vs_prev.startsWith('-')?'ow-up':'')}">${c.vs_prev}</div></div>`).join("") +
        `<div class="ow-plrow total"><div class="l">営業利益</div><div class="a">${yen(t.operating_profit)}</div><div class="p">${pct(t.operating_profit_rate)}</div><div class="d"></div></div></div>`;

      // ③ FL率の注意
      if (t.fl_rate > t.fl_target)
        h += `<div class="ow-card"><div class="ow-warn">⚠️ FL率 ${pct(t.fl_rate)}（目標 ${pct(t.fl_target)} を ${((t.fl_rate-t.fl_target)*100).toFixed(1)}pt 超過）</div></div>`;

      // ④ 12ヶ月推移（折れ線＝営業利益を主役に・独立の右軸で見せる）
      h += `<div class="ow-card"><h2>売上・営業利益 12ヶ月推移</h2><div class="chartbox tall"><canvas id="tcv"></canvas></div></div>`;

      // ⑤ 店舗比較（縦棒グラフ）
      h += `<div class="ow-card"><h2>店舗比較（売上）</h2><div class="chartbox"><canvas id="scv"></canvas></div></div>`;

      h += `</div>`;
      document.getElementById("app").innerHTML = h;
      drawTrend(trend);
      drawStores(m.by_store);
    }

    function drawTrend(rows){
      charts.t = new Chart(document.getElementById("tcv"), {
        data:{ labels:rows.map(r=>r.month),
          datasets:[
            { type:"bar", label:"売上", data:rows.map(r=>r.sales), backgroundColor:"#EEF1F2", borderRadius:3, yAxisID:"y", order:2 },
            { type:"line", label:"営業利益", data:rows.map(r=>r.profit), borderColor:BRAND, backgroundColor:BRAND, borderWidth:3, tension:.35, pointRadius:3, pointBackgroundColor:BRAND, yAxisID:"y1", order:1 }
          ]},
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ labels:{ font:{size:10}, boxWidth:12 } },
            tooltip:{ enabled:true, displayColors:false, callbacks:{ title:()=>"", label:c=> c.dataset.label+" "+yen(c.parsed.y) } } },
          scales:{
            x:gridX,
            y:{ grid:{color:"#F5F5F5"}, ticks:{font:{size:9},color:"#ccc", callback:v=> v>=10000?(v/10000)+"万":v } },
            y1:{ position:"right", grid:{display:false}, ticks:{font:{size:9},color:BRAND, callback:v=> v>=10000?(v/10000)+"万":v } }
          } }
      });
    }
    function drawStores(byStore){
      const labels = byStore.map(s=> (DATA.stores.find(x=>x.id===s.store)||{}).name || s.store);
      const bg = byStore.map(s=> s.profit_rate<0.18 ? NEG : BRAND);
      charts.s = new Chart(document.getElementById("scv"), {
        type:"bar",
        data:{ labels, datasets:[{ data: byStore.map(s=>s.net_sales), backgroundColor: bg, borderRadius:4, barPercentage:.55 }] },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false},
            tooltip:{ enabled:true, displayColors:false, callbacks:{ title:c=> c[0].label,
              label:c=> `売上 ${yen(c.parsed.y)}`,
              afterLabel:c=>{ const s=byStore[c.dataIndex]; return `利益率 ${pct(s.profit_rate)} ／ 廃棄率 ${pct(s.waste_rate)}`; } } } },
          scales:{ x:gridX, y:{...grid, ticks:{...grid.ticks, callback:v=> v>=10000?(v/10000)+"万":v }} } }
      });
    }

    document.getElementById("cta").addEventListener("click",()=>{ location.href = SHINDAN; });
    boot();
  </script>
</body>
</html>
