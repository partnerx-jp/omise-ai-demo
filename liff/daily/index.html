<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.line-scdn.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://partnerx-jp.github.io https://api.line.me https://*.line.me https://*.line-apps.com https://*.line-scdn.net;">
  <link rel="stylesheet" href="../shared.css?v=20260714">
  <title>日次実績レポート｜お店AI</title>
  <style>
    .chartbox { position: relative; height: 190px; }
    .rankrow { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--line); }
    .rankrow:first-child { border-top: none; }
    .rankrow .rk { width: 20px; color: var(--sub); font-size: 12px; font-weight: 700; }
    .rankrow .nm { flex: 1; min-width: 0; font-size: 13px; }
    .rankrow .pline { display: flex; align-items: baseline; white-space: nowrap; overflow: hidden; }
    .rankrow .pn { overflow: hidden; text-overflow: ellipsis; }
    .rankrow .pline small { margin-left: 5px; font-size: 11px; font-weight: 700; flex: 0 0 auto; }
    .rankrow .nm .ow-bar { margin-top: 5px; }
    .rankrow .qty { font-size: 12px; color: var(--sub); width: 44px; text-align: right; }
    .rankrow .amt { font-size: 13px; font-weight: 700; width: 74px; text-align: right; }
    .rankrow .qty .sh, .rankrow .amt .sh { display: block; font-size: 10px; font-weight: 400; color: var(--sub); margin-top: 2px; }
    .rankrow .ow-bar.neg i { background: var(--neg); opacity: .5; }
    .chartbox.donut { height: 172px; }
    .h2sub { font-size: 11px; font-weight: 400; color: var(--sub); margin-left: 4px; }
    .seg { padding: 8px 0; }
    .seg:first-of-type { padding-top: 2px; }
    .seg-lbl { font-size: 11px; color: var(--sub); margin-bottom: 5px; }
    .seg-bar { display: flex; height: 30px; border-radius: 7px; overflow: hidden; }
    .seg-bar i { display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; color: #4A4A4A; font-style: normal; white-space: nowrap; }
    .ow-header .ttl .ttl-date { font-size: 14px; font-weight: 400; color: var(--sub); margin-left: 7px; }
    .ow-h2row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .ow-h2row h2 { margin: 0; }
    .xf { display: flex; gap: 6px; flex-wrap: wrap; }
    .xf .pill { font-size: 11px; line-height: 1; padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px; color: var(--sub); background: #fff; white-space: nowrap; cursor: pointer; }
    .xf .pill.on { color: var(--brand); background: var(--brand-tint); border-color: var(--brand); font-weight: 700; }
  </style>
</head>
<body class="ow-hasbottom">
  <div class="ow-header">
    <div class="ttl" id="ttl">昨日の実績</div>
    <div class="sub" id="sub">読み込み中…</div>
  </div>
  <div class="ow-tabs" id="tabs"></div>
  <div id="app"><div class="ow-loading">読み込み中…</div></div>
  <div class="ow-cta"><button class="ow-btn" id="cta" style="background:linear-gradient(180deg,#12D262,#06C755);border:1.5px solid #05993F;color:#fff;box-shadow:0 3px 0 #05993F,0 4px 6px rgba(0,0,0,.16)">あなたのお店でお試し（無料相談）</button></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="../vendor/chart.umd.min.js"></script>
  <script>
    const LIFF_ID = "", SHINDAN = "../shindan/";
    const BLUE = "#00A0E9", GRAY = "#C9CDD1";
    const PAL = ["#ABD17E","#93C0E6","#F1A9C4","#F5BE73","#B6A2DA","#83CBC0","#BFC4C9"];
    const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
    const pct = n => (n>=0?"+":"") + (n*100).toFixed(1) + "%";
    const arrow = n => n>=0 ? "↑" : "↓";
    const WD = ["日","月","火","水","木","金","土"];
    const grid = { grid:{color:"#F0F0F0"}, ticks:{font:{size:10},color:"#999"} };
    const gridX = { grid:{display:false}, ticks:{font:{size:10},color:"#999"} };
    const tip = fn => ({ enabled:true, displayColors:false, callbacks:{ title:()=>"", label:fn } });
    let DATA, charts = {}, CUR = "all", ANIM = true;
    // クロス集計（時間帯グループ）: 各ボックスを選択時間帯で再集計
    const DP = [{k:"morning",label:"モーニング",band:0,hrs:[7,11]},{k:"lunch",label:"ランチ",band:1,hrs:[11,15]},{k:"cafe",label:"カフェ",band:2,hrs:[15,20]}];
    const FILT = { dept:null, top:null, worst:null, hourly:null, bands:null, segments:null, week:null };
    const dpBand = k => DP.find(x=>x.k===k).band;
    const anim = () => ANIM ? {duration:600} : false;
    function cardHead(title, box){
      const all = `<span class="pill${FILT[box]==null?' on':''}" data-box="${box}" data-dp="">全時間帯</span>`;
      const pills = DP.map(d=>`<span class="pill${FILT[box]===d.k?' on':''}" data-box="${box}" data-dp="${d.k}">${d.label}</span>`).join("");
      return `<div class="ow-h2row"><h2>${title}</h2><div class="xf">${all}${pills}</div></div>`;
    }

    function dLabel(off){ const d=new Date(); d.setDate(d.getDate()+(off||-1)); return `${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`; }
    function mdLabel(off){ const d=new Date(); d.setDate(d.getDate()+(off||-1)); return `${d.getMonth()+1}/${d.getDate()}`; }

    async function boot(){
      try { if (LIFF_ID && window.liff) await liff.init({liffId:LIFF_ID}).catch(()=>{}); } catch(e){}
      const SRC = ["../../data/demo-data.json", "https://partnerx-jp.github.io/omise-ai-demo/data/demo-data.json"];
      let lastErr;
      for (const u of SRC){ try { const r = await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(r.status); DATA = await r.json(); lastErr=null; break; } catch(e){ lastErr=e; } }
      if (!DATA){ document.getElementById("app").innerHTML = `<div class="ow-error">データを読み込めませんでした（${lastErr&&lastErr.message}）</div>`; return; }
      const dr = DATA.daily_report;
      document.getElementById("ttl").innerHTML = `昨日の実績<span class="ttl-date">${mdLabel(dr.date_offset)}</span>`;
      document.getElementById("sub").textContent = DATA.company.brand;
      buildTabs();
      render("all");
    }

    function buildTabs(){
      const tabs = [{id:"all",name:"全店"}].concat(DATA.stores.map(s=>({id:s.id,name:s.name})));
      const el = document.getElementById("tabs");
      el.innerHTML = tabs.map((t,i)=>`<span class="ow-tab${i===0?' on':''}" data-id="${t.id}">${t.name}</span>`).join("");
      el.querySelectorAll(".ow-tab").forEach(t=>t.addEventListener("click",()=>{
        el.querySelectorAll(".ow-tab").forEach(x=>x.classList.remove("on")); t.classList.add("on"); render(t.dataset.id);
      }));
    }
    const storeName = id => { const s=DATA.stores.find(s=>s.id===id); return s?s.name:"全店"; };

    function render(scope, quiet){
      const dr = DATA.daily_report;
      ANIM = !quiet;
      Object.values(charts).forEach(c=>c&&c.destroy()); charts = {};
      const key = scope==="all" ? "all" : scope;
      let net,cust,avg,vd;
      if (scope==="all"){ const t=dr.total; net=t.net_sales; cust=t.customers; avg=t.avg_spend; vd=t.vs_prev_day; }
      else { const b=dr.by_store.find(x=>x.store===scope); net=b.net_sales; cust=b.customers; avg=b.avg_spend; vd=b.vs_prev_day; }
      CUR = scope;
      const ratio = net / dr.total.net_sales;   // 店舗の売上シェアで各セクションを連動

      // クロス集計ヘルパー（選択した時間帯グループで再集計・辻褄を合わせる）
      const dep = dr.departments, depCur = dep[key] || dep.all, AFF = dr.daypart_affinity;
      const dw = d => { const i = dep.labels.indexOf(d); return (i>=0 && dep.all[i]) ? depCur[i]/dep.all[i] : 1; };
      const affOf = (dpk,d) => { if(!dpk) return 1; const i=dep.labels.indexOf(d); return i>=0 ? AFF[dpk][i] : 1; };
      const bandNet = dpk => dr.time_bands[key][dpBand(dpk)];
      const storeItems = Math.round(dr.total.items * ratio);
      const denFor = box => { const dpk=FILT[box]; if(!dpk) return {qty:storeItems, sales:net}; const bn=bandNet(dpk); return {qty:Math.max(1,Math.round(storeItems*bn/net)), sales:bn}; };
      const buildProd = (list,box) => { const dpk=FILT[box], bs = dpk ? bandNet(dpk)/net : 1;
        return list.map(p=>({...p,
          qty:Math.max(1,Math.round(p.qty*ratio*dw(p.dept)*affOf(dpk,p.dept)*bs)),
          sales:Math.round(p.sales*ratio*dw(p.dept)*affOf(dpk,p.dept)*bs)})); };
      const deptPct = () => { const dpk=FILT.dept; let a=depCur.slice(); if(dpk){ a=a.map((v,i)=>v*AFF[dpk][i]); const s=a.reduce((x,y)=>x+y,0); a=a.map(v=>Math.round(v/s*1000)/10);} return a; };
      const deptNet = () => FILT.dept ? bandNet(FILT.dept) : net;

      let h = `<div class="ow-wrap">`;

      // ① 売上ボックス
      h += `<div class="ow-card">
        <div class="ow-scope">${scope==="all"?"全店":storeName(scope)}</div>
        <div class="ow-hero-lbl">純売上（税抜）</div>
        <div class="ow-hero-main">
          <span class="ow-hero-val">${yen(net)}</span>
          <span class="ow-hero-delta"><span class="dl">前日比</span><span class="dv ${vd>=0?'ow-up':'ow-down'}">${pct(vd)}</span></span>
        </div>
        <div class="ow-kpi2">
          <div><div class="l">客数</div><div class="v">${cust}人</div></div>
          <div><div class="l">客単価</div><div class="v">${yen(avg)}</div></div>
        </div></div>`;

      // ② 目標達成率
      const mp = dr.month_progress;
      const cum = Math.round(mp.cum_sales*ratio);
      const ach = scope==="all" ? mp.achievement : (mp.store_achievement && mp.store_achievement[scope]!=null ? mp.store_achievement[scope] : mp.achievement);
      const achPct = Math.round(ach*100);
      h += `<div class="ow-card"><h2>今月の目標 達成率（経過${mp.elapsed_days}日）</h2>
        <div class="ow-prog"><i style="width:${achPct}%"></i></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:8px;color:var(--sub)"><span>累計 ${yen(cum)}</span><span class="${achPct>=80?'ow-up':''}">達成率 ${achPct}%</span></div></div>`;

      // ③ 部門別売上（ドーナツ）
      h += `<div class="ow-card">${cardHead("部門別 売上構成","dept")}<div class="chartbox donut"><canvas id="dcv"></canvas></div></div>`;

      // ④ 売れ筋 TOP5
      const tp = buildProd(dr.top_products,"top").sort((a,b)=>b.sales-a.sales).map((p,i)=>({...p, rank:i+1}));
      const mxT = Math.max(...tp.map(p=>p.sales));
      h += `<div class="ow-card">${cardHead("売れ筋 TOP5","top")}` + rankHTML(tp,mxT,"pos",denFor("top")) + `</div>`;

      // ⑤ 死に筋 TOP5
      const wp = buildProd(dr.worst_products,"worst").sort((a,b)=>a.sales-b.sales).map((p,i)=>({...p, rank:i+1}));
      const mxW = Math.max(...wp.map(p=>p.sales));
      h += `<div class="ow-card">${cardHead("死に筋 TOP5","worst")}` + rankHTML(wp,mxW,"neg",denFor("worst")) + `</div>`;

      // ⑥ 時間帯別売上
      h += `<div class="ow-card">${cardHead("時間帯別 売上","hourly")}<div class="chartbox"><canvas id="hcv"></canvas></div></div>`;

      // ⑦ 時間帯グループ別売上
      h += `<div class="ow-card">${cardHead("時間帯グループ別 売上","bands")}<div class="chartbox"><canvas id="bcv"></canvas></div></div>`;

      // ⑧ 客層
      const sg = dr.segments;
      const segVals = (grp,segKey)=>{ let [a,b]=grp[key]||grp.all; const dpk=FILT.segments; const dd=(dpk&&dr.segment_daypart[dpk])?dr.segment_daypart[dpk][segKey]:0; if(dd){ a=Math.min(97,Math.max(3,a+dd)); b=100-a; } return [a,b]; };
      h += `<div class="ow-card">${cardHead("客層","segments")}`
        + segRow("会員", segVals(sg.new_repeat,"new_repeat"), sg.new_repeat.labels, ["#93C0E6","#ABD17E"])
        + segRow("性別", segVals(sg.gender,"gender"), sg.gender.labels, ["#93C0E6","#F1A9C4"])
        + segRow("国籍", segVals(sg.nationality,"nationality"), sg.nationality.labels, ["#B6A2DA","#F5BE73"])
        + `</div>`;

      // 直近7日 / 完売アラート / AIひとこと（維持）
      const wkScale = FILT.week ? bandNet(FILT.week)/net : 1;
      const week = dr.last7days.map(r=>({dow:r.dow, sales:Math.round(r.sales*ratio*wkScale)}));
      h += `<div class="ow-card">${cardHead("直近7日間の売上"+(scope==="all"?"（全店）":""),"week")}<div class="chartbox"><canvas id="wcv"></canvas></div></div>`;
      if (dr.sellout_alert && (scope==="all" || scope===dr.sellout_alert.store))
        h += `<div class="ow-card"><div class="ow-warn">⚠️ ${storeName(dr.sellout_alert.store)}：${dr.sellout_alert.items.join(" / ")}<br>完売が早く、夕方の機会損失が出ています。</div></div>`;
      const ai = scope==="all" ? dr.ai_comment : (dr.store_comment && dr.store_comment[scope] ? dr.store_comment[scope] : dr.ai_comment);
      h += `<div class="ow-card"><div class="ow-ai"><b>💬 AIのひとこと</b><br>${ai}</div></div>`;

      h += `</div>`;
      document.getElementById("app").innerHTML = h;

      const hours = scope==="all" ? sumHourly(dr.hourly_sales) : dr.hourly_sales[scope].map(x=>({hour:x.hour,sales:x.sales}));
      drawDonut(dep.labels, deptPct(), deptNet());
      drawHourly(hours, FILT.hourly);
      drawBands(dr.time_bands, key, FILT.bands);
      drawWeek(week);

      document.querySelectorAll(".xf .pill").forEach(el=>el.addEventListener("click",()=>{
        const b=el.dataset.box, dp=el.dataset.dp; FILT[b] = dp ? dp : null; render(CUR, true);
      }));
    }

    function rankHTML(list,mx,tone,den){
      const fp = x => (x>=10 ? Math.round(x) : x.toFixed(1)) + "%";
      return list.map(p=>`<div class="rankrow"><div class="rk">${p.rank}</div>
        <div class="nm"><div class="pline"><span class="pn">${p.name}</span><small class="${p.vs_prev>=0?'ow-up':'ow-down'}">${p.vs_prev>=0?'+':''}${p.vs_prev}${arrow(p.vs_prev)}</small></div>
          <div class="ow-bar ${tone==='neg'?'neg':''}"><i style="width:${Math.round(p.sales/mx*100)}%"></i></div></div>
        <div class="qty">${p.qty}個<span class="sh">(${fp(p.qty/den.qty*100)})</span></div>
        <div class="amt">${yen(p.sales)}<span class="sh">(${fp(p.sales/den.sales*100)})</span></div></div>`).join("");
    }

    function segRow(label, vals, segLabels, colors){
      const [a,b] = vals;
      const seg=(w,lab,col)=>`<i style="width:${w}%;background:${col}">${w>=18?lab+" ":""}${w}%</i>`;
      return `<div class="seg"><div class="seg-lbl">${label}</div>
        <div class="seg-bar">${seg(a,segLabels[0],colors[0])}${seg(b,segLabels[1],colors[1])}</div></div>`;
    }

    function sumHourly(hs){ const m={}; Object.values(hs).forEach(a=>a.forEach(x=>m[x.hour]=(m[x.hour]||0)+x.sales));
      return Object.keys(m).map(h=>({hour:+h,sales:m[h]})).sort((a,b)=>a.hour-b.hour); }

    function drawHourly(rows, dp){
      const rg = dp ? DP.find(x=>x.k===dp).hrs : null;
      const bg = rows.map(r=> !rg ? BLUE : (r.hour>=rg[0]&&r.hour<rg[1] ? BLUE : "#DBE1E6"));
      charts.h = new Chart(document.getElementById("hcv"), { type:"bar",
        data:{ labels:rows.map(r=>r.hour+"時"), datasets:[{ data:rows.map(r=>r.sales), backgroundColor:bg, borderRadius:3 }] },
        options:{ responsive:true, maintainAspectRatio:false, animation:anim(), plugins:{legend:{display:false}, tooltip:tip(c=>yen(c.parsed.y))},
          scales:{x:gridX,y:{...grid,ticks:{...grid.ticks,callback:v=>v>=10000?v/10000+"万":v}}} } });
    }
    function drawWeek(rows){
      charts.w = new Chart(document.getElementById("wcv"), { type:"line",
        data:{ labels:rows.map(r=>r.dow), datasets:[{ data:rows.map(r=>r.sales), borderColor:BLUE, backgroundColor:"rgba(0,160,233,.10)", fill:true, tension:.35, pointRadius:3, pointBackgroundColor:BLUE }] },
        options:{ responsive:true, maintainAspectRatio:false, animation:anim(), plugins:{legend:{display:false}, tooltip:tip(c=>yen(c.parsed.y))},
          scales:{x:gridX,y:{...grid,ticks:{...grid.ticks,callback:v=>v>=10000?v/10000+"万":v}}} } });
    }
    function drawDonut(labels, pcts, net){
      const sales = pcts.map(p=>Math.round(net*p/100));
      charts.d = new Chart(document.getElementById("dcv"), { type:"doughnut",
        data:{ labels, datasets:[{ data:pcts, backgroundColor:PAL, borderWidth:0 }] },
        options:{ responsive:true, maintainAspectRatio:false, cutout:"58%", animation:anim(),
          plugins:{ legend:{position:"right",labels:{font:{size:10},boxWidth:12,padding:7}},
            tooltip:tip(c=>`${c.label} ${yen(sales[c.dataIndex])}（${c.parsed}%）`) } } });
    }
    function drawBands(tb, key, dp){
      const data = tb[key] || tb.all;
      const base = ["#ABD17E","#93C0E6","#F5BE73"], sel = dp ? DP.find(x=>x.k===dp).band : -1;
      const bg = data.map((v,i)=> sel<0||i===sel ? base[i] : "#E3E7EA");
      charts.b = new Chart(document.getElementById("bcv"), { type:"bar",
        data:{ labels:tb.labels, datasets:[{ data, backgroundColor:bg, borderRadius:4, barPercentage:.6 }] },
        options:{ responsive:true, maintainAspectRatio:false, animation:anim(), plugins:{legend:{display:false}, tooltip:tip(c=>yen(c.parsed.y))},
          scales:{x:{...gridX,ticks:{...gridX.ticks,font:{size:10}}},y:{...grid,ticks:{...grid.ticks,callback:v=>v>=10000?v/10000+"万":v}}} } });
    }

    document.getElementById("cta").addEventListener("click",()=>{ location.href = SHINDAN; });
    boot();
  </script>
</body>
</html>
